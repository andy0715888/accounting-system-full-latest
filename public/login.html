<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记账系统 - 登录</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div id="app" class="login-container">
        <div class="bg-layer" id="bgLayer"></div>
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <span class="logo-icon">📊</span>
                    <h1>记账系统</h1>
                </div>
                <p class="subtitle">个人财务管理助手</p>
            </div>
            <div class="login-body">
                <div class="error-msg" id="errorMsg"></div>
                <div class="input-group">
                    <label for="username">用户名</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
                    </div>
                </div>
                <div class="input-group">
                    <label for="password">密码</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
                    </div>
                </div>
                <button id="loginBtn" class="login-btn">登 录</button>
                <div class="login-footer">
                    <span>还没有账号？</span>
                    <a href="#" id="showRegister">立即注册</a>
                </div>
                <div class="register-form" id="registerForm" style="display:none;">
                    <div class="input-group">
                        <label for="regUsername">用户名</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="regUsername" placeholder="请输入用户名">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="regPassword">密码</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="regPassword" placeholder="至少6位">
                        </div>
                    </div>
                    <button id="registerBtn" class="login-btn register-btn">注 册</button>
                    <div class="login-footer">
                        <a href="#" id="showLogin">返回登录</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/js/login.js"></script>
</body>
</html>
